services:
  - type: web
    name: bella-india-bites
    env: docker
    plan: starter
    region: oregon
    buildCommand: docker build -t bella-india-bites .
    startCommand: docker run -p $PORT:80 bella-india-bites
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_PROJECT_ID
        sync: false
    healthCheckPath: /health
    autoDeploy: true 